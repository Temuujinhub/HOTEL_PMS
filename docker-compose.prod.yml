# =============================================================================
# Cloud PMS — PRODUCTION stack (self-contained)
#
# Used by the GitHub Actions "Deploy" workflow on the DigitalOcean droplet:
#
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# Only Caddy publishes a host port (80). Postgres, Redis, the API and the web
# app are reachable only on the internal Docker network and through the proxy,
# so the database is never exposed to the public internet.
#
#   Public site : http://<server-ip>/
#   API docs    : http://<server-ip>/api/docs
# =============================================================================
name: cloudpms

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-cloudpms}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pms} -d ${POSTGRES_DB:-cloudpms}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-pms}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cloudpms}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      SEED_ON_START: ${SEED_ON_START:-false}
    expose:
      - '4000'
    healthcheck:
      # Use 127.0.0.1 (not "localhost") so the check forces IPv4 — the API binds
      # 0.0.0.0:4000 (IPv4) and "localhost" can resolve to IPv6 ::1 in Alpine,
      # which would make the healthcheck (and only the healthcheck) fail.
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4000/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
    expose:
      - '3000'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - '80:80'
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
