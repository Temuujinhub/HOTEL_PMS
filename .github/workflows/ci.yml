name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  api:
    name: API — build & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - name: Install
        working-directory: apps/api
        run: npm ci
      - name: Prisma generate
        working-directory: apps/api
        run: npx prisma generate
      - name: Lint
        working-directory: apps/api
        run: npm run lint
      - name: Build
        working-directory: apps/api
        run: npm run build
      - name: Unit tests
        working-directory: apps/api
        run: npm test --if-present

  web:
    name: Web — build & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        working-directory: apps/web
        run: npm ci
      - name: Lint
        working-directory: apps/web
        run: npm run lint
      - name: Build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
        run: npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t cloudpms-api ./apps/api
      - name: Build Web image
        run: docker build -t cloudpms-web --build-arg NEXT_PUBLIC_API_URL=http://localhost:4000 ./apps/web
