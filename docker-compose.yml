# =============================================================================
# Cloud PMS — full stack (Postgres + Redis + API + Web)
# Usage:
#   cp .env.example .env   # then edit secrets
#   docker compose up -d --build
# App:  http://localhost:3000   API docs: http://localhost:4000/api/docs
# =============================================================================
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pms_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-cloudpms}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pms} -d ${POSTGRES_DB:-cloudpms}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-pms}:${POSTGRES_PASSWORD:-pms_dev_pw}@postgres:5432/${POSTGRES_DB:-cloudpms}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_min_16_chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret_min_16_chars}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev_only_32_byte_encryption_key!!}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # Set to "true" the first time to load demo data
      SEED_ON_START: ${SEED_ON_START:-false}
    ports:
      - '${API_PORT:-4000}:4000'
    healthcheck:
      # 127.0.0.1 (not "localhost") forces IPv4 — the API binds 0.0.0.0:4000 and
      # "localhost" can resolve to IPv6 ::1 in Alpine, failing the healthcheck.
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4000/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
    ports:
      - '${WEB_PORT:-3000}:3000'

volumes:
  pgdata:
